name: Build Packages

# 触发条件：手动触发 + 标签推送
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: 'latest'
  push:
    tags:
      - "*"

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          # - aarch64_cortex-a72
          # - aarch64_cortex-a76
          # - aarch64_generic
          # - arm_arm1176jzf-s_vfp
          # - arm_arm926ej-s
          # - arm_cortex-a15_neon-vfpv4
          # - arm_cortex-a5_vfpv4
          # - arm_cortex-a7
          # - arm_cortex-a7_neon-vfpv4
          # - arm_cortex-a7_vfpv4
          # - arm_cortex-a8_vfpv3
          # - arm_cortex-a9
          # - arm_cortex-a9_neon
          # - arm_cortex-a9_vfpv3-d16
          # - arm_fa526
          # - arm_xscale
          # - i386_pentium-mmx
          # - i386_pentium4
          # - loongarch64_generic
          # - mips64_mips64r2
          # - mips64_octeonplus
          # - mips64el_mips64r2
          # - mips_24kc
          # - mips_4kec
          # - mips_mips32
          # - mipsel_24kc
          # - mipsel_24kc_24kf
          # - mipsel_74kc
          # - mipsel_mips32
          # - riscv64_riscv64
          # - x86_64
        sdk:
          # - openwrt-18.06
          - openwrt-24.10
          # - openwrt-25.12
          # - SNAPSHOT

    steps:
      # - uses: actions/checkout@main
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 先安装UPX依赖（SDK可能未预装）
      - name: Install UPX
        uses: crazy-max/ghaction-upx@v4
        with:
          install-only: true
          # version: latest
      - name: UPX version
        run: upx --version

      # - name: Build with Static Linking
        # run: |
          # sed -i '/golang-package/a \\tGO_PKG_DEFAULT_LDFLAGS:=-w -s -extldflags "-static"' mosdns/Makefile

      - name: Build preparation
        run: |
          sed -i '/golang-package/a \\tGO_PKG_DEFAULT_LDFLAGS:=-w -s -extldflags "-static"' mosdns/Makefile
          sed -i '/golang-package/a \\tGO_PKG_DEFAULT_LDFLAGS:=-w -s -extldflags "-static"' v2dat/Makefile
          git clone https://github.com/sbwml/v2ray-geodata
          echo "SKIP_BUILD=0" >> $GITHUB_ENV
          if [ "${{ matrix.sdk }}" = "openwrt-25.12" ] && [ "${{ matrix.arch }}" = "riscv64_riscv64" ]; then
            echo "EFFECTIVE_ARCH=riscv64_generic" >> $GITHUB_ENV
            echo "ARCH=riscv64_generic-${{ matrix.sdk }}" >> $GITHUB_ENV
          elif [ "${{ matrix.sdk }}" = "openwrt-25.12" ] && [ "${{ matrix.arch }}" = "mips_4kec" ]; then
            echo "SKIP_BUILD=1" >> $GITHUB_ENV
          else
            echo "EFFECTIVE_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV
            echo "ARCH=${{ matrix.sdk }}-${{ matrix.arch }}" >> $GITHUB_ENV
          fi

      # - name: UPX Compress
        # if: ${{ matrix.arch != 'loongarch64_generic' && matrix.arch != 'mips64_mips64r2' && matrix.arch != 'mips64_octeonplus' && matrix.arch != 'mips64el_mips64r2' && matrix.arch != 'riscv64_riscv64' }}
        if: |
          env.SKIP_BUILD == '0' &&
          env.EFFECTIVE_ARCH != 'loongarch64_generic' &&
          env.EFFECTIVE_ARCH != 'mips64_mips64r2' &&
          env.EFFECTIVE_ARCH != 'mips64_octeonplus' &&
          env.EFFECTIVE_ARCH != 'mips64el_mips64r2' &&
          env.EFFECTIVE_ARCH != 'riscv64_riscv64' &&
          env.EFFECTIVE_ARCH != 'riscv64_generic'
        run: |
          sed -i '/\/usr\/bin\/mosdns/a \\t\/usr\/bin\/upx --lzma --best $(1)\/usr\/bin\/mosdns' mosdns/Makefile

      - name: Building packages
        if: ${{ env.SKIP_BUILD == '0' }}
        # uses: sbwml/openwrt-gh-action-sdk@go1.22
        uses: sbwml/openwrt-gh-action-sdk@go1.25
        # uses: sbwml/openwrt-gh-action-sdk@go1.26
        env:
          # ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-mosdns
          NO_REFRESH_CHECK: true

      # - name: Upload artifacts
        # uses: actions/upload-artifact@v4
        # with:
          # name: ${{ env.ARCH }}
          # path: |
            # bin/packages/${{ matrix.arch }}/packages_ci/*.apk
            # bin/packages/riscv64_generic/packages_ci/*.apk
            # bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Create compress files
        if: ${{ env.SKIP_BUILD == '0' }}
        continue-on-error: true
        # run: |
          # if [ "${{ matrix.arch }}" = "riscv64_riscv64" ] && [ "${{ matrix.sdk }}" = "SNAPSHOT" ]; then
            # tar -zcvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/riscv64_generic/ packages_ci
          # else
            # tar -zcvf ${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz -C bin/packages/${{ matrix.arch }}/ packages_ci
          # fi
        run: |
          tar -zcvf ${{ env.ARCH }}.tar.gz -C bin/packages/${{ env.EFFECTIVE_ARCH }}/ packages_ci

      - name: Upload packages
        if: ${{ env.SKIP_BUILD == '0' }}
        uses: ncipollo/release-action@v1
        with:
          # 显式指定 tag 参数，兼容手动输入和标签推送
          tag: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          # artifacts: "${{ matrix.sdk }}-${{ matrix.arch }}.tar.gz"
          artifacts: "${{ env.ARCH }}.tar.gz"
          # 手动触发时若未输入 tag，默认使用 latest，避免空值
          # fallbackTag: latest
